[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

markers =
    slow: marks tests as slow (audio analysis, ML inference)
    integration: marks integration tests requiring network or DB
    unit: marks pure unit tests (default)

# Ignore unrelated dirs
norecursedirs = .git dist node_modules audio_cache data
