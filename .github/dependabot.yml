# Dependabot auto-updates — see https://docs.github.com/code-security/dependabot

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Vancouver"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "automerge"
    reviewers:
      - "sgm"
    groups:
      test-deps:
        patterns:
          - "pytest*"
      lint-deps:
        patterns:
          - "ruff"
          - "bandit"
          - "pip-audit"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "ci"
      - "dependencies"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    labels:
      - "docker"
      - "dependencies"
